<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS HERO 3D - Advanced Medical HUD</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<!-- Three.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root {
    --bg-gradient: linear-gradient(135deg, #0a1118, #121e2b, #1a2c3d);
    --container-bg: rgba(10, 25, 40, 0.75);
    --text-color: #ffffff;
    --accent-color: #00e676;
    --hud-cyan: #00f0ff;
    --hud-red: #ff1744;
}

body {
    margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-gradient); color: var(--text-color);
    text-align: center; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
}

.app-container {
    max-width: 450px; width: 92%; height: 95vh; margin: auto; padding: 15px;
    background: var(--container-bg); border-radius: 25px; box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
    backdrop-filter: blur(20px); border: 1px solid rgba(0, 240, 255, 0.2);
    display: flex; flex-direction: column; position: relative; box-sizing: border-box;
}

.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.active-screen { display: flex; }

h1 { font-size: 20px; margin: 5px 0; text-transform: uppercase; letter-spacing: 1.5px; color: var(--hud-cyan); text-shadow: 0 0 8px rgba(0, 240, 255, 0.5); }
p { font-size: 12px; opacity: 0.9; line-height: 1.4; margin: 4px 0; }

button {
    display: block; width: 100%; margin: 6px 0; padding: 12px; font-size: 13px; font-weight: bold; border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 12px; cursor: pointer; transition: all 0.2s ease;
    background: rgba(0, 240, 255, 0.1); color: white; text-transform: uppercase; letter-spacing: 1px;
}
button:active { transform: scale(0.97); background: rgba(0, 240, 255, 0.3); }

.btn-menu-play { background: rgba(0, 230, 118, 0.2); border-color: var(--accent-color); color: var(--accent-color); }
.btn-menu-games { background: rgba(255, 0, 127, 0.2); border-color: #ff007f; color: #ff007f; }
.btn-back { background: rgba(255,255,255,0.05); color: #888; margin-top: auto; padding: 10px; border-color: rgba(255,255,255,0.1); }

/* --- 🖥️ PAINEL HOLOGRÁFICO (HUD STYLES) --- */
.hud-canvas-container {
    position: relative; width: 100%; height: 220px; margin: 10px 0; border-radius: 16px; border: 1px solid rgba(0, 240, 255, 0.4);
    overflow: hidden; background: #050a0f; box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.2);
}

#hud-3d-viewport { width: 100%; height: 100%; cursor: pointer; }

/* TELAS HOLOGRAMA SOBREPOSTAS */
.hologram-overlay {
    position: absolute; top: 10px; left: 10px; right: 10px; pointer-events: none;
    display: flex; justify-content: space-between; align-items: flex-start;
}

.holo-card {
    background: rgba(0, 240, 255, 0.08); border: 1px solid rgba(0, 240, 255, 0.4);
    border-radius: 8px; padding: 6px 10px; backdrop-filter: blur(5px);
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); text-align: left;
}

.holo-title { font-size: 9px; text-transform: uppercase; color: var(--hud-cyan); opacity: 0.8; }
.holo-value { font-size: 16px; font-weight: 900; color: #ffffff; text-shadow: 0 0 5px var(--hud-cyan); }

/* VETOR DE DIREÇÃO DA MANOBRA (SETAS) */
.hud-arrow-guide {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    pointer-events: none; font-size: 22px; color: var(--hud-cyan);
    animation: pulseArrow 0.6s infinite alternate; text-shadow: 0 0 10px var(--hud-cyan);
}
@keyframes pulseArrow { from { transform: translate(-50%, 0); opacity: 0.4; } to { transform: translate(-50%, 8px); opacity: 1; } }

.games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; overflow-y: auto; flex-grow: 1; }
.game-card { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
</style>
</head>
<body>

<div class="app-container">

    <!-- MENU PRINCIPAL -->
    <div id="screen-menu" class="screen active-screen">
        <div style="margin-top: 20px;">
            <span style="font-size: 40px; color: var(--hud-cyan);">🩺</span>
            <h1>SOS HERO 3D</h1>
            <p>Simulador Tático de Atendimento Médico</p>
        </div>

        <div style="margin-top: 40px;">
            <button class="btn-menu-play" onclick="start3DRcp()">❤️ SIMULAÇÃO RCP 3D</button>
            <button class="btn-menu-games" onclick="changeScreen('screen-games-menu')">🕹️ CENTRAL DE TREINAMENTO</button>
        </div>
        <p style="margin-top: auto; font-size: 10px; opacity: 0.4;">HUD Simulation Engine 11.0</p>
    </div>

    <!-- CENTRAL DE MINI-JOGOS -->
    <div id="screen-games-menu" class="screen">
        <h1>MÓDULOS TÁTICOS</h1>
        <div class="games-grid" style="margin-top: 15px;">
            <div class="game-card" onclick="start3DRcp()"><span>❤️</span><br><strong>RCP 3D</strong></div>
            <div class="game-card" onclick="alert('Módulo 3D em sincronização!')"><span>⚡</span><br><strong>DEA 3D</strong></div>
            <div class="game-card" onclick="alert('Módulo 3D em sincronização!')"><span>🥖</span><br><strong>Heimlich 3D</strong></div>
            <div class="game-card" onclick="alert('Módulo 3D em sincronização!')"><span>🧠</span><br><strong>AVC 3D</strong></div>
        </div>
        <button class="btn-back" onclick="changeScreen('screen-menu')">↩ Voltar</button>
    </div>

    <!-- TELA SIMULADOR RCP 3D HUD -->
    <div id="screen-rcp-3d" class="screen">
        <h1>ESTAÇÃO RCP HOLOGRÁFICA</h1>
        <p style="font-size: 11px; color: var(--hud-cyan);">Toque na tela mantendo o ritmo de 110 BPM</p>

        <!-- VIEWPORT 3D COM OVERLAY HOLOGRÁFICO -->
        <div class="hud-canvas-container" onclick="handle3DCompress()">
            <div id="hud-3d-viewport"></div>

            <!-- TELAS HOLOGRAMA SOBREPOSTAS (HUD) -->
            <div class="hologram-overlay">
                <div class="holo-card">
                    <div class="holo-title">FREQUÊNCIA</div>
                    <div class="holo-value" id="hud-bpm">110 BPM</div>
                </div>
                <div class="holo-card">
                    <div class="holo-title">COMPRESSÕES</div>
                    <div class="holo-value" id="hud-count">0 / 20</div>
                </div>
            </div>

            <!-- GUIA DE SETA HOLOGRÁFICA DE COMPRESSÃO -->
            <div class="hud-arrow-guide">⬇️</div>
        </div>

        <div id="hud-feedback" style="font-size:14px; font-weight:bold; height:20px; color:var(--accent-color);">AGUARDANDO AÇÃO...</div>
        <button class="btn-back" onclick="stop3DRcp()">↩ Encerrar Simulação</button>
    </div>

</div>

<script>
let scene, camera, renderer, chestMesh, handsGroup;
let compressCount = 0; let lastCompressTime = 0;

function changeScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
    document.getElementById(id).classList.add('active-screen');
}

// --- 🌐 INICIALIZAÇÃO DA CENA 3D HUD ---
function init3DHudScene() {
    const viewport = document.getElementById("hud-3d-viewport");
    if(!viewport) return;

    viewport.innerHTML = "";
    const w = viewport.clientWidth; const h = viewport.clientHeight;

    // 1. Cena e Câmera estilo Centro de Simulação
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050c14);

    camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 100);
    camera.position.set(0, 3.8, 4.5);
    camera.lookAt(0, -0.2, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(w, h);
    renderer.shadowMap.enabled = true;
    viewport.appendChild(renderer.domElement);

    // 2. Iluminação Tática Neon Hospitalar
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const cyanLight = new THREE.DirectionalLight(0x00f0ff, 0.8);
    cyanLight.position.set(-3, 5, 3);
    scene.add(cyanLight);

    const greenLight = new THREE.DirectionalLight(0x00e676, 0.6);
    greenLight.position.set(3, 5, -2);
    scene.add(greenLight);

    // 3. Maca / Tabela Médica 3D
    const bedGeo = new THREE.BoxGeometry(3.5, 0.3, 1.4);
    const bedMat = new THREE.MeshPhongMaterial({ color: 0x101f2e });
    const bed = new THREE.Mesh(bedGeo, bedMat);
    bed.position.y = -0.5;
    scene.add(bed);

    // 4. Manequim de Atendimento 3D
    // Cabeça
    const headGeo = new THREE.SphereGeometry(0.3, 16, 16);
    const skinMat = new THREE.MeshPhongMaterial({ color: 0xd1a374 });
    const head = new THREE.Mesh(headGeo, skinMat);
    head.position.set(-1.2, -0.1, 0);
    scene.add(head);

    // Tórax (A região comprimida)
    const chestGeo = new THREE.BoxGeometry(1.0, 0.5, 0.8);
    const shirtMat = new THREE.MeshPhongMaterial({ color: 0x0088cc });
    chestMesh = new THREE.Mesh(chestGeo, shirtMat);
    chestMesh.position.set(-0.3, -0.1, 0);
    scene.add(chestMesh);

    // 5. Braços e Luvas Cirúrgicas Táticas
    handsGroup = new THREE.Group();
    
    const gloveGeo = new THREE.BoxGeometry(0.35, 0.2, 0.35);
    const gloveMat = new THREE.MeshPhongMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.85 }); // Luva ciano holográfica
    const glove = new THREE.Mesh(gloveGeo, gloveMat);
    handsGroup.add(glove);

    handsGroup.position.set(-0.3, 0.3, 0);
    scene.add(handsGroup);

    // 6. Loop de Renderização Física
    function render() {
        if(document.getElementById("screen-rcp-3d").classList.contains("active-screen")) {
            requestAnimationFrame(render);

            // Retorno Elástico Suave do Peito
            if(chestMesh && chestMesh.position.y < -0.1) chestMesh.position.y += 0.015;
            if(handsGroup && handsGroup.position.y < 0.3) handsGroup.position.y += 0.015;

            renderer.render(scene, camera);
        }
    }
    render();
}

function start3DRcp() {
    compressCount = 0; lastCompressTime = 0;
    document.getElementById("hud-count").innerHTML = "0 / 20";
    changeScreen("screen-rcp-3d");
    setTimeout(init3DHudScene, 100);
}

function handle3DCompress() {
    const now = Date.now();

    // Afunda peito e luvas 3D
    if(chestMesh && handsGroup) {
        chestMesh.position.y = -0.22;
        handsGroup.position.y = 0.12;
    }

    if(lastCompressTime !== 0) {
        const bpm = 60 / ((now - lastCompressTime) / 1000);
        if(bpm >= 90 && bpm <= 130) {
            document.getElementById("hud-feedback").innerHTML = "🟢 RITMO EXCELENTE";
            compressCount++;
        } else {
            document.getElementById("hud-feedback").innerHTML = "⚠️ RITMO INCORRETO";
        }
    }
    lastCompressTime = now;
    document.getElementById("hud-count").innerHTML = `${compressCount} / 20`;

    if(compressCount >= 20) {
        alert("🎉 Simulação Concluída com Sucesso!");
        changeScreen("screen-games-menu");
    }
}

function stop3DRcp() { changeScreen("screen-games-menu"); }
</script>

</body>
</html>
