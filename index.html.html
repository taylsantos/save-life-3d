<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS HERO - Atendimento de Rua 2D</title>

<style>
:root {
    --bg-color: #0b131e;
    --card-bg: #162232;
    --accent-blue: #00f0ff;
    --accent-green: #00e676;
    --accent-red: #ff1744;
    --accent-yellow: #ffd166;
}

body {
    margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-color); color: #fff;
    display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
}

.app-container {
    width: 92%; max-width: 450px; height: 95vh; background: var(--card-bg);
    border-radius: 20px; padding: 15px; box-sizing: border-box;
    display: flex; flex-direction: column; border: 1px solid rgba(0, 240, 255, 0.3);
    box-shadow: 0 0 25px rgba(0, 240, 255, 0.15); position: relative;
}

.screen { display: none; flex-direction: column; height: 100%; }
.active-screen { display: flex; }

h1 { font-size: 18px; color: var(--accent-blue); margin: 0 0 5px 0; text-transform: uppercase; text-shadow: 0 0 8px rgba(0,240,255,0.4); }
p { font-size: 11px; opacity: 0.8; margin-bottom: 8px; }

button {
    background: rgba(0, 240, 255, 0.15); color: #fff; border: 1px solid var(--accent-blue);
    padding: 10px; border-radius: 10px; font-weight: bold; font-size: 12px; margin: 4px 0;
    cursor: pointer; text-transform: uppercase; transition: all 0.2s;
}
button:active { transform: scale(0.96); background: rgba(0, 240, 255, 0.3); }
.btn-red { background: rgba(255, 23, 68, 0.2); border-color: var(--accent-red); color: #ff80ab; }
.btn-green { background: rgba(0, 230, 118, 0.2); border-color: var(--accent-green); color: var(--accent-green); }
.btn-back { background: rgba(255,255,255,0.05); color: #aaa; margin-top: auto; border-color: #555; }

/* 🛣️ CENÁRIO DA RUA 2D */
.street-canvas {
    position: relative; width: 100%; height: 230px; background: #1c2526;
    border-radius: 15px; border: 2px solid #334455; overflow: hidden; margin-bottom: 10px;
}

/* Linhas do asfalto */
.road-line {
    position: absolute; top: 50%; left: 0; right: 0; height: 4px;
    background: repeating-linear-gradient(90deg, #ffd166 0, #ffd166 20px, transparent 20px, transparent 40px);
}

/* BONEQUINHO (VÍTIMA) DEITADO */
.dummy-body {
    position: absolute; left: 50%; top: 55%; transform: translate(-50%, -50%);
    width: 140px; height: 45px; cursor: pointer;
}
.dummy-head { position: absolute; left: 0; top: 12px; width: 22px; height: 22px; background: #ffd1a4; border-radius: 50%; border: 2px solid #000; }
.dummy-torso { position: absolute; left: 24px; top: 10px; width: 50px; height: 26px; background: #1e88e5; border-radius: 6px; border: 2px solid #000; }
.dummy-legs { position: absolute; left: 76px; top: 13px; width: 55px; height: 20px; background: #37474f; border-radius: 4px; border: 2px solid #000; }

/* Lesão / Sangramento piscante */
.wound-mark {
    position: absolute; width: 14px; height: 14px; background: #ff1744; border-radius: 50%;
    box-shadow: 0 0 10px #ff1744; animation: pulseWound 0.8s infinite alternate; display: none;
}
@keyframes pulseWound { from { transform: scale(0.8); opacity: 0.6; } to { transform: scale(1.3); opacity: 1; } }

/* FERRAMENTAS DO SOCORRISTA */
.tool-bar { display: flex; justify-content: space-around; gap: 5px; margin-bottom: 8px; }
.tool-btn { flex: 1; padding: 8px 4px; font-size: 10px; background: rgba(0,0,0,0.4); border: 1px solid var(--accent-blue); border-radius: 8px; }

/* MONITOR DE CAMPO */
.hud-monitor {
    background: #000; border: 1px solid var(--accent-green); border-radius: 8px; padding: 6px 10px;
    display: flex; justify-content: space-between; font-family: monospace; font-size: 11px; color: var(--accent-green); margin-bottom: 8px;
}
</style>
</head>
<body>

<div class="app-container">

    <!-- MENU PRINCIPAL -->
    <div id="screen-menu" class="screen active-screen">
        <span style="font-size: 35px;">🚑</span>
        <h1>SOS HERO 2D - ATENDIMENTO DE RUA</h1>
        <p>Atenda ocorrências reais no asfalto com o boneco interativo</p>

        <button class="btn-red" onclick="startStreetGame('hemo')">🩸 OCORRÊNCIAS DE HEMORRAGIA NA RUA</button>
        <button class="btn-green" onclick="startStreetGame('pcr')">🫀 OCORRÊNCIAS DE PCR NA RUA</button>
        <button onclick="alert('Selecione uma das ocorrências no menu!')">📋 GUIA DE CAMPO APH</button>

        <p style="margin-top: auto; font-size: 10px; opacity: 0.4;">Simulador de Rua v5.0</p>
    </div>

    <!-- TELA DO JOGO NA RUA (UNIFICADA) -->
    <div id="screen-street" class="screen">
        <h1 id="street-title">OCORRÊNCIA DE RUA</h1>
        <p id="street-subtitle">Identifique o problema e aja no boneco</p>

        <!-- MONITOR DE CAMPO -->
        <div class="hud-monitor">
            <span>RITMO: <b id="hud-ritmo" style="color:var(--accent-green);">SINUSAL</b></span>
            <span>FC: <b id="hud-fc">80</b> BPM</span>
            <span>SANGRAMENTO: <b id="hud-bleed" style="color:var(--accent-green);">0%</b></span>
        </div>

        <!-- CENÁRIO DA RUA COM O BONEQUINHO -->
        <div class="street-canvas" onclick="handleStreetClick()">
            <div class="road-line"></div>
            
            <!-- VÍTIMA 2D DEITADA -->
            <div class="dummy-body">
                <div class="dummy-head"></div>
                <div class="dummy-torso" id="dummy-chest"></div>
                <div class="dummy-legs"></div>
                
                <!-- PONTO DE FERIMENTO NO BONECO -->
                <div class="wound-mark" id="wound-spot"></div>
            </div>
        </div>

        <!-- BARRA DE FERRAMENTAS DO SOCORRISTA -->
        <div class="tool-bar" id="hemo-tools" style="display:none;">
            <button class="tool-btn" onclick="selectTool('torniquete')">🩸 TORNIQUETE</button>
            <button class="tool-btn" onclick="selectTool('gaze')">🩹 GAZE (JUNÇÃO)</button>
            <button class="tool-btn" onclick="selectTool('pressao')">✋ PRESSÃO DIRETA</button>
        </div>

        <div id="street-feedback" style="font-size:12px; font-weight:bold; color:var(--accent-yellow); margin: 4px 0;">Selecione a ação...</div>

        <button class="btn-back" onclick="changeScreen('screen-menu')">↩ Encerrar Ocorrência</button>
    </div>

</div>

<script>
let currentMode = 'hemo';
let selectedTool = null;
let bleedLevel = 100;
let compressionsCount = 0;
let currentScenarioIndex = 0;

const streetScenarios = [
    { title: "Atropelamento por Carro", desc: "Vítima atingida na perna. Sangramento arterial jorrando na coxa!", woundPos: { left: '85px', top: '15px' }, correctTool: 'torniquete', mode: 'hemo' },
    { title: "Queda de Moto na Rodovia", desc: "Corte profundo na virilha (área de junção). Sangramento volumoso continuo!", woundPos: { left: '68px', top: '15px' }, correctTool: 'gaze', mode: 'hemo' },
    { title: "Queda de Bicicleta no Asfalto", desc: "Corte venoso continuo no antebraço sem atingir artéria.", woundPos: { left: '35px', top: '5px' }, correctTool: 'pressao', mode: 'hemo' }
];

function changeScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
    document.getElementById(id).classList.add('active-screen');
}

function startStreetGame(mode) {
    currentMode = mode;
    changeScreen('screen-street');

    if(mode === 'hemo') {
        document.getElementById("street-title").innerHTML = "ESTANCAR HEMORRAGIA";
        document.getElementById("hemo-tools").style.display = "flex";
        loadHemoStreetScenario();
    } else {
        document.getElementById("street-title").innerHTML = "REANIMAÇÃO PCR NA RUA";
        document.getElementById("street-subtitle").innerHTML = "Toque no peito do boneco para comprimir!";
        document.getElementById("hemo-tools").style.display = "none";
        document.getElementById("wound-spot").style.display = "none";
        
        // Configura monitor para PCR
        document.getElementById("hud-ritmo").innerHTML = "PARADA (FV)";
        document.getElementById("hud-ritmo").style.color = "var(--accent-red)";
        document.getElementById("hud-fc").innerHTML = "0";
        document.getElementById("hud-bleed").innerHTML = "N/A";
        document.getElementById("street-feedback").innerHTML = "Toque no PEITO do boneco para fazer RCP!";
        compressionsCount = 0;
    }
}

function loadHemoStreetScenario() {
    const sc = streetScenarios[currentScenarioIndex];
    document.getElementById("street-title").innerHTML = sc.title;
    document.getElementById("street-subtitle").innerHTML = sc.desc;
    
    // Posiciona a ferida no boneco
    const wound = document.getElementById("wound-spot");
    wound.style.display = "block";
    wound.style.left = sc.woundPos.left;
    wound.style.top = sc.woundPos.top;

    bleedLevel = 100;
    document.getElementById("hud-bleed").innerHTML = "100%";
    document.getElementById("hud-bleed").style.color = "var(--accent-red)";
    document.getElementById("street-feedback").innerHTML = "Escolha a ferramenta abaixo e toque no ferimento!";
}

function selectTool(tool) {
    selectedTool = tool;
    document.getElementById("street-feedback").innerHTML = `Ferramenta selecionada: ${tool.toUpperCase()}. Agora toque no ferimento!`;
}

function handleStreetClick() {
    if(currentMode === 'hemo') {
        const sc = streetScenarios[currentScenarioIndex];
        if(!selectedTool) {
            alert("Selecione primeiro uma ferramenta na barra abaixo!");
            return;
        }

        if(selectedTool === sc.correctTool) {
            bleedLevel -= 35;
            if(bleedLevel <= 0) bleedLevel = 0;
            
            document.getElementById("hud-bleed").innerHTML = `${bleedLevel}%`;
            
            if(bleedLevel === 0) {
                document.getElementById("hud-bleed").style.color = "var(--accent-green)";
                document.getElementById("wound-spot").style.display = "none";
                alert("🟢 HEMORRAGIA ESTANCADA COM SUCESSO NO BONECO!\nVocê aplicou a técnica correta na rua!");
                currentScenarioIndex = (currentScenarioIndex + 1) % streetScenarios.length;
                selectedTool = null;
                loadHemoStreetScenario();
            } else {
                document.getElementById("street-feedback").innerHTML = "🟢 Continue aplicando no local até zerar!";
            }
        } else {
            alert("🔴 FERRAMENTA INCORRETA PARA ESTA LESÃO!\nLembre-se: Torniquete em membros, Gaze em junções e Pressão em cortes venosos.");
        }
    } else if(currentMode === 'pcr') {
        // Animação de compressão no peito do boneco
        const chest = document.getElementById("dummy-chest");
        chest.style.transform = "scaleY(0.8)";
        setTimeout(() => chest.style.transform = "scaleY(1)", 100);

        compressionsCount++;
        document.getElementById("hud-fc").innerHTML = `${compressionsCount * 6}`;

        if(compressionsCount >= 20) {
            document.getElementById("hud-ritmo").innerHTML = "SINUSAL";
            document.getElementById("hud-ritmo").style.color = "var(--accent-green)";
            document.getElementById("hud-fc").innerHTML = "75";
            alert("⚡ PARADA REVERTIDA NA RUA!\nO ritmo do paciente voltou ao normal!");
            changeScreen('screen-menu');
        } else {
            document.getElementById("street-feedback").innerHTML = `Compressões: ${compressionsCount} / 20`;
        }
    }
}
</script>

</body>
</html>
